<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CUBE RUN 😈</title>
    <meta name="description" content="Can you survive the sensory overload? Dissonant beats, evil taunts, and hyper-speed gravity swaps. Play at your own risk.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://turfin-logic.github.io/CubeRun/">
    <meta property="og:title" content="CUBE RUN 😈">
    <meta property="og:description" content="Only 1% can pass 500 score. The game that watches you.">
    <meta property="og:image" content="https://turfin-logic.github.io/CubeRun/logo.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://turfin-logic.github.io/CubeRun/">
    <meta property="twitter:title" content="CUBE RUN 😈">
    <meta property="twitter:description" content="Sensory overload is here. Are you ready to drift?">
    <meta property="twitter:image" content="https://turfin-logic.github.io/CubeRun/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }
    </script>
    <!-- GameDistribution SDK -->
    <script>
        window["GD_OPTIONS"] = {
            "gameId": "b13fb38f722340388cd26e643ed2d6f8",
            "onEvent": function(event) {
                switch (event.name) {
                    case "SDK_GAME_START":
                        if (window.resumeGameFromAd) window.resumeGameFromAd();
                        break;
                    case "SDK_GAME_PAUSE":
                        if (window.pauseGameForAd) window.pauseGameForAd();
                        break;
                    case "SDK_REWARDED_WATCH_COMPLETE":
                        if (window.FlutterBridge) window.FlutterBridge.onRewardGranted();
                        break;
                }
            },
        };
        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = 'https://html5.api.gamedistribution.com/main.min.js';
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'gamedistribution-sdk'));
    </script>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            alert("JS Error: " + msg + "\nLine: " + line + "\nCol: " + col);
            document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:10px;font-size:12px;max-width:100vw;">ERROR: ' + msg + '<br>Line: ' + line + '</div>';
            return false;
        };
        window.addEventListener("unhandledrejection", function(e) {
            alert("Promise Error: " + e.reason);
        });
    </script>
    <!-- Fast APK Detection -->
    <script>if(window.AdChannel) window.IS_APK = true;</script>

</head>
<body>
    <div id="game-container">
        <div id="scanner-line"></div>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">

            <!-- HUD (visible during gameplay) -->
            <div id="hud">
                <div id="score-display">SCORE: <span id="scoreValue">0</span></div>
                <div id="hud-buttons">
                    <button id="pause-btn" class="hud-btn" title="Pause">⏸</button>
                    <button id="settings-btn" class="hud-btn" title="Settings">⚙</button>
                </div>
            </div>

            <!-- Main Menu Screen -->
            <div id="start-screen" class="screen active">
                <div class="unified-logo">
                    <div class="outer-square"></div>
                    <div class="inner-square"></div>
                    <div class="center-dot"></div>
                </div>
                <h1 class="glitch" data-text="CUBE RUN">CUBE RUN</h1>
                <p>Tap or Spacebar to switch gravity</p>
                  <div class="mode-selector" style="margin-top: 15px; margin-bottom: 20px;">
                      <label style="color: var(--neon-pink); font-family: 'Space Mono', monospace; font-size: 0.9rem; letter-spacing: 2px;">SELECT MODE:</label>
                      <div class="mode-carousel" style="display: flex; align-items: center; justify-content: space-between; background: rgba(20,20,20,0.8); border: 2px solid var(--neon-pink); border-radius: 4px; margin-top: 8px; max-width: 280px; margin-left: auto; margin-right: auto; padding: 5px;">
                          <button id="mode-prev" class="mode-nav-btn" style="background: transparent; border: none; color: var(--neon-pink); font-size: 1.5rem; cursor: pointer; padding: 0 10px;">◄</button>
                          <div id="mode-display" style="color: #fff; font-family: 'Space Mono', monospace; font-size: 0.9rem; text-align: center; flex-grow: 1;">CLASSIC (GRAVITY FLIP)</div>
                          <button id="mode-next" class="mode-nav-btn" style="background: transparent; border: none; color: var(--neon-pink); font-size: 1.5rem; cursor: pointer; padding: 0 10px;">►</button>
                      </div>
                      <input type="hidden" id="mode-select" value="CLASSIC">
                  </div>
                <button id="start-btn" class="cyber-btn">START DRIFT</button>
                <button onclick="window.open('https://play.google.com/store/apps/details?id=com.mangaverse.app', '_blank')" class="cyber-btn mangaverse-btn" style="margin-top: 15px; font-size: 1rem; padding: 10px 20px;">🎮 EXPLORE MANGAVERSE</button>
                <button onclick="downloadApk()" class="cyber-btn apk-only" style="margin-top: 15px; font-size: 1rem; padding: 10px 20px; background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink);">GET IT ON PLAY STORE</button>
            </div>

            <!-- Pause Screen -->
            <div id="pause-screen" class="screen">
                <h2 class="cyber-text">⏸ PAUSED</h2>
                <button class="cyber-btn" id="resume-btn">▶ RESUME</button>
                <button class="cyber-btn" id="settings-from-pause-btn" style="margin-top:12px;">⚙ SETTINGS</button>
                <button class="cyber-btn" id="quit-btn" style="margin-top:12px; border-color: #555; color: #888;">✕ QUIT TO MENU</button>
            </div>

            <!-- Settings Screen -->
            <div id="settings-screen" class="screen">
                <h2 class="cyber-text">⚙ SETTINGS</h2>
                <div class="setting-row">
                    <label>SOUND FX</label>
                    <button class="toggle-btn" id="sfx-toggle" data-key="sfx">ON</button>
                </div>
                <div class="setting-row">
                    <label>MUSIC</label>
                    <button class="toggle-btn" id="music-toggle" data-key="music">ON</button>
                </div>
                <div class="setting-row">
                    <label>VIBRATION</label>
                    <button class="toggle-btn" id="vib-toggle" data-key="vibration">ON</button>
                </div>
                <button class="cyber-btn" id="settings-back-btn" style="margin-top:20px;">◀ BACK</button>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen">
                <button id="menu-btn-icon" style="position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.5); border: 2px solid var(--neon-pink); border-radius: 50%; color: var(--neon-pink); cursor: pointer; z-index: 9999; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--neon-pink);">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <h2 class="glitch" data-text="SYSTEM FAILURE">SYSTEM FAILURE</h2>
                <div class="stats">
                    <p>FINAL SCORE: <span id="finalScore">0</span></p>
                    <p>HIGH SCORE: <span id="highScore">0</span></p>
                    <p id="new-record-badge" style="display:none; color: #FFD700; font-size: 1.1rem;">⭐ NEW RECORD!</p>
                </div>

                  <div id="game-over-btns" style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                      <button id="revive-btn" class="cyber-btn revive-btn" style="display: none;">🚀 WATCH AD TO REVIVE</button>
                      <button id="restart-btn" class="cyber-btn">REBOOT SYSTEM</button>
                      <button onclick="window.open('https://play.google.com/store/apps/details?id=com.mangaverse.app', '_blank')" class="cyber-btn mangaverse-btn" style="font-size: 1rem; padding: 10px 20px; width: 100%;">🎮 EXPLORE MANGAVERSE</button>
                      <button onclick="downloadApk()" class="cyber-btn apk-only" style="font-size: 1rem; padding: 10px 20px; background: transparent; width: 100%;">GET IT ON PLAY STORE</button>
                  </div>

                <div class="sta-container" style="margin-top: 20px;">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px; text-align: center;">SHARE YOUR SCORE</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button onclick="shareToWhatsApp()" class="social-btn whatsapp">WhatsApp</button>
                        <button onclick="shareToTelegram()" class="social-btn telegram">Telegram</button>
                    </div>
                </div>
            </div>

        </div><!-- end ui-layer -->
    </div><!-- end game-container -->

    <script src="game.js"></script>
</body>
</html>
